<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>TBC Simulator</title>
    <link rel="icon" type="image/png" href="tbcsim-icon.png">
    <style>
      :root {
        color-scheme: dark;
        background: #07101f;
      }

      html,
      body {
        min-width: 950px;
        min-height: 865px;
        margin: 0;
        padding: 0;
        overflow: auto;
        background: #07101f;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      #screen {
        width: 950px;
        height: 865px;
        flex: 0 0 auto;
      }

      #appspinner {
        width: 950px;
        min-height: 865px;
        margin: 0;
        overflow: visible;
        color: #d8e6f3;
        font-family: sans-serif;
      }

      #appspinner center {
        margin-top: 3em;
        line-height: 150%;
      }

      #appspinner img {
        display: block;
        width: 160px;
        height: 160px;
        margin: 0 auto 18px;
      }

      #appspinner strong {
        display: block;
        color: #ffd341;
        font-size: 22px;
      }

      #appstatus {
        margin-top: 8px;
        color: #9fb7d0;
      }
    </style>
  </head>
  <body>
    <figure id="appspinner">
      <center>
        <img src="tbcsim-icon.png" alt="TBCSim">
        <strong>TBCSim</strong>
        <div id="appstatus"></div>
        <noscript>JavaScript is disabled. Please enable JavaScript to use this application.</noscript>
      </center>
    </figure>
    <div id="screen"></div>

    <script src="coi-serviceworker.js"></script>
    <script src="TBCSim.js"></script>
    <script src="qtloader.js"></script>
    <script type="text/javascript">
        async function init()
        {
            const spinner = document.querySelector('#appspinner');
            const screen = document.querySelector('#screen');
            const status = document.querySelector('#appstatus');

            const showUi = (ui) => {
                [spinner, screen].forEach(element => element.style.display = 'none');
                if (screen === ui)
                    screen.style.position = 'default';
                ui.style.display = 'block';
            }

            try {
                showUi(spinner);
                status.innerHTML = 'Loading simulator...';

                const instance = await qtLoad({
                    qt: {
                        onLoaded: () => showUi(screen),
                        onExit: exitData =>
                        {
                            status.innerHTML = 'Application exit';
                            status.innerHTML +=
                                exitData.code !== undefined ? ` with code ${exitData.code}` : '';
                            status.innerHTML +=
                                exitData.text !== undefined ? ` (${exitData.text})` : '';
                            showUi(spinner);
                        },
                        entryFunction: window.createQtAppInstance,
                        containerElements: [screen],
                    }
                });
            } catch (e) {
                console.error(e);
                console.error(e.stack);
            }
        }

        window.addEventListener('load', init);
    </script>
  </body>
</html>
